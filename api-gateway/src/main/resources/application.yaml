server:
  port: 9090

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/customers/**

        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/api/accounts/**

        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/api/transactions/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
